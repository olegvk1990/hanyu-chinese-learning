version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: hanyu-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: hanyu
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    container_name: hanyu-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hanyu-server
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongo:27017/hanyu
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-hanyu-production-secret-change-me}
      JWT_EXPIRES_IN: 30d
      NODE_ENV: production
    ports:
      - "3001:3001"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: hanyu-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"

  seed:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hanyu-seed
    depends_on:
      - mongo
    environment:
      MONGODB_URI: mongodb://mongo:27017/hanyu
    command: ["node", "src/seeds/index.js"]
    restart: "no"
    profiles:
      - seed

volumes:
  mongo_data:
  redis_data:
